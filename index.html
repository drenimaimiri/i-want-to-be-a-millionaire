<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kush Do të Bëhet Milioner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="particles-canvas"></canvas>
    
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-logo">Kush Do të Bëhet Milioner</div>
        <div class="loading-spinner"></div>
        <div class="loading-text">Duke ngarkuar...</div>
    </div>
    
    <div class="container">
        <div class="logo">Kush Do të Bëhet Milioner</div>

        <div id="homeScreen" class="screen active">
            <h2 style="margin-bottom: 20px;">Mirë se vini!</h2>
            <button class="btn" onclick="showCreator()">Krijo Kuizin Tënd</button>
            <button class="btn btn-secondary" onclick="startQuiz()">Luaj Kuizin</button>
        </div>

        <div id="creatorScreen" class="screen">
            <h2>Krijo Kuizin Tënd</h2>
            <div class="input-group">
                <label>Numri i Pyetjeve</label>
                <input type="number" id="numQuestions" min="1" max="15" value="5" onchange="updateQuestionCount()">
            </div>
            <div id="questionsContainer"></div>
            <button class="btn" onclick="generateLink()">Gjenero Linkun</button>
            <button class="btn btn-secondary" onclick="showScreen('homeScreen')">Mbrapa</button>
            
            <div id="linkSection" style="display: none;">
                <div class="link-container">
                    <p>Ndaje këtë link me të tjerët:</p>
                    <input type="text" id="shareLink" readonly>
                </div>
                <button class="btn" onclick="copyLink()">Kopjo Linkun</button>
            </div>
        </div>

        <div id="quizScreen" class="screen">
            <div class="lifelines-container">
                <button class="btn btn-lifeline" id="lifeline5050" onclick="use5050()">50:50</button>
                <button class="btn btn-lifeline" id="lifelineHint" onclick="useHint()">Ndihmë</button>
                <button class="btn btn-lifeline" id="lifelineCall" onclick="useCallFriend()">Thërre Miqun</button>
            </div>
            
            <div class="timer-container">
                <div class="timer-bar">
                    <div class="timer-fill" id="timerFill"></div>
                </div>
                <div class="timer-text" id="timerText">Koha: 30s</div>
            </div>
            
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            
            <div class="question-card">
                <div class="question-number" id="questionNumber">Pyetja 1</div>
                <div class="question-text" id="questionText">Duke ngarkuar...</div>
                <div class="answers-grid" id="answersGrid"></div>
            </div>
        </div>

        <div id="resultScreen" class="screen result-screen">
            <h2>Kuizi Përfundoi!</h2>
            <div class="score" id="finalScore">$0</div>
            <div class="message" id="resultMessage">Më shumë fat herën tjetër!</div>
            <button class="btn" onclick="showScreen('homeScreen')">Luaj Përsëri</button>
            <button class="btn btn-secondary" onclick="shareResults()">Ndaje Rezultatin</button>
        </div>
    </div>

    <div id="modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 id="modalTitle"></h3>
            <div id="modalBody"></div>
            <button class="btn" onclick="closeModal()">Mbyll</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
